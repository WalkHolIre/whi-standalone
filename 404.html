<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link rel="stylesheet" href="css/styles.min.css"/>
    <title>Page Not Found | Walking Holiday Ireland</title>
    <meta name="robots" content="noindex, nofollow"/>
    <link rel="icon" type="image/png" href="/images/logo/favicon.png"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #f5f0e8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1.5rem 1rem;
        }
        .container {
            max-width: 700px;
            width: 100%;
        }
        .logo-link {
            display: inline-block;
            margin-bottom: 1.25rem;
        }
        .logo-link img {
            height: 50px;
        }
        .illustration {
            width: 100%;
            max-width: 650px;
            margin: 0 auto 1.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
        .buttons {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .btn {
            padding: 13px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s, transform 0.15s;
        }
        .btn:hover { transform: translateY(-1px); }
        .btn-primary {
            background: #4a7c59;
            color: white;
        }
        .btn-primary:hover { background: #3d6a4b; }
        .btn-secondary {
            background: #8b6914;
            color: white;
        }
        .btn-secondary:hover { background: #745812; }
        .help-text {
            color: #6b6b6b;
            font-size: 0.85rem;
        }
        .help-text a {
            color: #4a7c59;
            text-decoration: underline;
        }
        .help-text a:hover { color: #3d6a4b; }
        @media (max-width: 480px) {
            .illustration { max-width: 100%; }
            .buttons { flex-direction: column; align-items: center; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="logo-link">
            <img src="/images/logo/walking_holiday_ireland_logo.jpg" alt="Walking Holiday Ireland" onerror="this.style.display='none'"/>
        </a>
        <img src="/images/404-lost-hiker.png" alt="A confused hiker lost at a crossroads with signs pointing to the pub and the bog - Oh Feck! You're totally lost! 404 Path Not Found" class="illustration"/>
        <div class="buttons">
            <a href="/" class="btn btn-primary">
                <span class="material-symbols-outlined" style="font-size: 18px;">hiking</span>
                Hike Back to Home
            </a>
            <a href="/walking-tours" class="btn btn-secondary">
                <span class="material-symbols-outlined" style="font-size: 18px;">map</span>
                Find a Real Trail
            </a>
        </div>
        <p class="help-text">
            Need help? <a href="/contact">Get in touch</a> or call <a href="tel:+353429323396">+353 42 932 3396</a>
        </p>
    </div>
</body>
</html>
